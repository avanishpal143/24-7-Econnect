<svg width="220" height="60" viewBox="0 0 220 60" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Dark rounded box -->
  <rect x="0" y="0" width="90" height="60" rx="16" fill="url(#boxGradW)"/>

  <!-- 24x7 text inside box -->
  <text x="45" y="38" font-family="Poppins, Inter, Arial, sans-serif" font-size="22" font-weight="800" fill="url(#textGradW)" text-anchor="middle" letter-spacing="-0.5">24x7</text>

  <!-- Econnect text — white for dark backgrounds -->
  <text x="108" y="40" font-family="Poppins, Inter, Arial, sans-serif" font-size="26" font-weight="700" fill="#ffffff" letter-spacing="-0.5">Econnect</text>

  <defs>
    <linearGradient id="boxGradW" x1="0" y1="0" x2="90" y2="60" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3a3a3a"/>
      <stop offset="100%" stop-color="#111111"/>
    </linearGradient>
    <linearGradient id="textGradW" x1="20" y1="20" x2="70" y2="45" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#aaaaaa"/>
    </linearGradient>
  </defs>
</svg>
